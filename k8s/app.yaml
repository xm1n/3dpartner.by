apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-3dpartner
  namespace: 3dpartner
  labels:
    app: 3dpartner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: 3dpartner
  template:
    metadata:
      labels:
        app: 3dpartner
    spec:
      containers:
        - name: app
          image: 3dpartner:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: 3dpartner-config
            - secretRef:
                name: 3dpartner-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: app-3dpartner
  namespace: 3dpartner
spec:
  selector:
    app: 3dpartner
  ports:
    - port: 80
      targetPort: 3000
---
# Опционально: автомасштабирование по CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-3dpartner-hpa
  namespace: 3dpartner
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-3dpartner
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
