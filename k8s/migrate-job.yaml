# Одноразовый Job: применить миграции Payload к БД.
# Использовать при ошибке 42P01 (relation does not exist).
#
# Запуск:
#   kubectl apply -f k8s/migrate-job.yaml -n 3dpartner
# Проверить статус:
#   kubectl get jobs -n 3dpartner
#   kubectl logs job/payload-migrate -n 3dpartner
# Удалить Job после успешного выполнения:
#   kubectl delete job payload-migrate -n 3dpartner
---
apiVersion: batch/v1
kind: Job
metadata:
  name: payload-migrate
  namespace: 3dpartner
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: 3dpartner:latest
          imagePullPolicy: IfNotPresent
          command: ["pnpm", "payload", "migrate"]
          envFrom:
            - configMapRef:
                name: 3dpartner-config
            - secretRef:
                name: 3dpartner-secret
