# Одноразовый Job: применить миграции Payload к БД.
# Использовать при ошибке 42P01 (relation does not exist).
#
# Образ 3dpartner:migrate должен быть собран из стадии builder (в нём есть pnpm и payload CLI):
#   docker build --target builder -t 3dpartner:migrate .
# Затем импортировать в k3s: docker save 3dpartner:migrate | sudo k3s ctr images import -
#
# Запуск:
#   kubectl apply -f k8s/migrate-job.yaml -n 3dpartner
# Проверить статус:
#   kubectl get jobs -n 3dpartner
#   kubectl logs job/payload-migrate -n 3dpartner
# Удалить Job после успешного выполнения:
#   kubectl delete job payload-migrate -n 3dpartner
---
apiVersion: batch/v1
kind: Job
metadata:
  name: payload-migrate
  namespace: 3dpartner
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: 3dpartner:migrate
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command:
            - node
            - --import
            - ./scripts/register-loader.mjs
            - ./node_modules/payload/bin.js
            - --disable-transpile
            - migrate
          envFrom:
            - configMapRef:
                name: 3dpartner-config
            - secretRef:
                name: 3dpartner-secret
